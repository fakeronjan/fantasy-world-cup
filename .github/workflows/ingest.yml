name: ingest-live-results

# Runs scripts/ingest_results.py on a cron to keep team records, player
# points, and the leaderboard in sync with the live tournament.
#
# Triggers:
#   - Schedule: every 15 minutes (96/day; well under any free-tier limit)
#   - Manual: workflow_dispatch from the Actions tab for ad-hoc reruns
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   - FOOTBALL_DATA_KEY   : the football-data.org API key
#   - FIREBASE_SA_BASE64  : the service account JSON, base64-encoded.
#     Generate with:
#       base64 -i fantasy-world-cup-2026-firebase-adminsdk-fbsvc-*.json | pbcopy
#     Then paste into the secret.
#
# End-of-tournament: the moment ingest_results.py sees the Final finish, it
# writes a frozen stats archive to docs/archive/2026/ (see scripts/archive_stats.py).
# The first run that commits that archive also dispatches email_digest.yml's
# Final round-recap and then DISABLES both this workflow and email_digest.yml
# via the GitHub API - no more scheduled (or manual!) runs until someone
# `gh workflow enable`'s them again. That's intentional: disabling a workflow
# blocks workflow_dispatch too, not just the schedule.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # contents:write lets the projections/archive steps commit back; actions:write
    # lets the end-of-tournament step dispatch + disable workflows via `gh`.
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Decode Firebase service account
        run: |
          mkdir -p /tmp/fwc
          echo "${{ secrets.FIREBASE_SA_BASE64 }}" | base64 -d > /tmp/fwc/sa.json
          chmod 600 /tmp/fwc/sa.json

      - name: Run ingest
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/fwc/sa.json
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/ingest_results.py

      # Monte Carlo projection of every user's final total, conditioned on
      # results to date. Fixed seed -> identical state yields a byte-identical
      # file, so the commit below is a no-op unless ingest changed something.
      - name: Refresh projections
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/fwc/sa.json
        run: python scripts/project_standings.py --runs 20000 --seed 2026

      - name: Commit projections if changed
        run: |
          if git diff --quiet -- docs/data/projections.json; then
            echo "projections unchanged - nothing to commit"
          else
            git config user.name  "fwc-ingest-bot"
            git config user.email "actions@users.noreply.github.com"
            git add docs/data/projections.json
            git commit -m "Update projections [skip ci]"
            git push
          fi

      # Fires exactly once - the run where ingest_results.py first writes
      # docs/archive/2026/ (the Final just finished). `git status --porcelain`
      # on that path IS the "did we just archive for the first time" signal.
      - name: Commit archive if newly created
        id: archive
        run: |
          if git status --porcelain docs/archive/2026/ | grep -q .; then
            git config user.name  "fwc-ingest-bot"
            git config user.email "actions@users.noreply.github.com"
            git add docs/archive/2026/
            git commit -m "Archive final 2026 tournament stats"
            git push
            echo "just_archived=true" >> "$GITHUB_OUTPUT"
          else
            echo "just_archived=false" >> "$GITHUB_OUTPUT"
          fi

      # Dispatch BEFORE disabling: disabling only blocks future triggers, the
      # run just queued here is unaffected. Disable email_digest.yml first,
      # ingest.yml (this workflow) last - safe, since disabling a workflow
      # doesn't cancel the run currently disabling it.
      - name: Trigger Final recap email + disable both crons
        if: steps.archive.outputs.just_archived == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run email_digest.yml -f mode=round -f round_name=Final
          gh workflow disable email_digest.yml
          gh workflow disable ingest.yml

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/fwc/sa.json
